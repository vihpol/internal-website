services:
  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    environment:
      SEARXNG_BASE_URL: http://searxng:8080/
      SEARXNG_SECRET: ${SEARXNG_SECRET:-micas-private-search-change-me}
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro

  backend:
    image: micas-assistops-backend
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.5-flash}
      SEARXNG_URL: http://searxng:8080
      ANALYTICS_DB: /data/analytics.db
    volumes:
      - analytics_data:/data
    ports:
      - "8010:8000"
    depends_on:
      - searxng

  frontend:
    image: micas-assistops-frontend
    build:
      context: ./frontend
      args:
        BACKEND_URL: http://backend:8000
        NEXT_PUBLIC_MICROSOFT_TENANT_ID: ${MICROSOFT_TENANT_ID:-cd3cf671-aff3-46a2-8cf4-3fc771ae270e}
        NEXT_PUBLIC_MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "80:3000"
    depends_on:
      - backend

volumes:
  analytics_data:
